services:
  postgres:
    image: postgres:16
    container_name: jobbot-postgres
    environment:
      POSTGRES_USER: jobbot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobbot_dev_password}
      POSTGRES_DB: jobbot
    ports:
      - "5432:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
    restart: unless-stopped
